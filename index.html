<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Tkuarchal</title>
    <style>
        :root { --primary: #3b4cca; --bg: #f5f6fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: #2d3436; }
        header { background: linear-gradient(135deg, #3b4cca 0%, #1e293b 100%); padding: 45px 25px 60px; border-radius: 0 0 40px 40px; color: white; text-align: center; }
        header h1 { margin: 0; font-size: 28px; font-weight: 900; font-style: italic; }
        .insta-scroll { display: flex; overflow-x: auto; padding: 15px 20px; gap: 15px; scrollbar-width: none; }
        .insta-item { flex: 0 0 85%; background: white; border-radius: 30px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 80px; background: white; display: flex; justify-content: space-around; align-items: center; border-radius: 30px 30px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.05); }
        .nav-link { font-size: 26px; color: #cbd5e1; cursor: pointer; padding: 10px; }
        .nav-link.active { color: var(--primary); transform: translateY(-8px); transition: 0.3s; }
    </style>
</head>
<body>
    <header><h1>admin</h1><p>ТКУАРЧАЛ В ТВОЕМ КАРМАНЕ</p></header>
    <div id="content-display" style="text-align:center; padding:50px; color:#b2bec3; font-weight:800;">ЗАГРУЗКА...</div>
    <nav class="nav-bar">
        <div class="nav-link" onclick="load('tourism', this)">🏠</div>
        <div class="nav-link" onclick="load('news', this)">📰</div>
        <div class="nav-link" onclick="load('рейсы', this)">🚌</div>
        <div class="nav-link" onclick="load('sport', this)">🏆</div>
        <div class="nav-link" onclick="load('Службы', this)">📞</div>
    </nav>
    <script>
        const URL = "https://script.google.com";
        async function load(tab, el) {
            if(el) { document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active')); el.classList.add('active'); }
            const box = document.getElementById('content-display');
            box.innerHTML = "СИНХРОНИЗАЦИЯ...";
            try {
                const r = await fetch(URL + "?type=" + encodeURIComponent(tab));
                const data = await r.json();
                box.innerHTML = '';
                if(data && data.length > 0) {
                    box.className = 'insta-scroll';
                    data.forEach(item => {
                        const v = Object.values(item);
                        box.innerHTML += <div class="insta-item"><img src="${v||''}" style="width:100%;height:200px;object-fit:cover;"><div style="padding:15px;"><h4>${v}</h4><p>${v||''}</p></div></div>;
                    });
                } else { box.innerHTML = "ПУСТО 🍃"; }
            } catch(e) { box.innerHTML = "ОШИБКА СВЯЗИ 🌐"; }
        }
        window.onload = () => load('tourism');
    </script>
</body>
</html>
